# EPFL combinational benchmark catalog (path references only; no file copies).
#
# Paths are relative to the repository root.
# Gate counts are from: graduate-abc -c "read <aig>; strash; ps" (2026-07-09).

version: 1
benchmark_root: third_party/benchmarks/EPFL

suites:
  arithmetic:
    root: third_party/benchmarks/EPFL/arithmetic
    formats: [aig, blif, v, vhd]
  random_control:
    root: third_party/benchmarks/EPFL/random_control
    formats: [aig, blif, v, vhd]

scale_thresholds:
  tiny:
    max_and_gates: 1000
    description: Fastest smoke tests and script debugging
  small:
    min_and_gates: 1000
    max_and_gates: 5000
    description: Smoke tests, CI, quick iteration
  medium:
    min_and_gates: 5000
    max_and_gates: 30000
    description: Regular synthesis / mapping experiments
  large:
    min_and_gates: 30000
    description: Stress tests and QoR evaluation

benchmarks:
  # --- arithmetic ---
  - id: arithmetic/adder
    name: adder
    suite: arithmetic
    path: third_party/benchmarks/EPFL/arithmetic/adder.aig
    scale: small
    stats: {inputs: 256, outputs: 129, and_gates: 1020, level: 255}

  - id: arithmetic/max
    name: max
    suite: arithmetic
